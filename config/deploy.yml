service: dokedu
image: dokedu/dokedu:latest

servers:
  - host: localhost

env:
  clear:
    NUXT_S3_ENDPOINT: "http://localhost:9000"
    NUXT_S3_BUCKET: dokedu
    NUXT_S3_REGION: local
  secret:
    - NUXT_SESSION_PASSWORD
    - NUXT_DSN
    - NUXT_S3_ACCESS_KEY_ID
    - NUXT_S3_SECRET_ACCESS_KEY
    - NUXT_POSTMARK_SERVER_TOKEN